<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 스타봉봉 — K-POP 굿즈샵</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Cafe24SsurroundAir';
  src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/Cafe24SsurroundAir.woff') format('woff');
}
:root {
  --main:    #f19ec2;
  --main2:   #e8809e;
  --bg:      #fbfbe2;
  --dark:    #7a4a5e;
  --mid:     #c47a9a;
  --light:   #fde8f2;
  --peach:   #ffd9c0;
  --yellow:  #fff0b0;
  --coral:   #ffb8c8;
  --apricot: #ffc8a0;
  --card:    #f5f5d0;
  --border:  #f5c8dc;
  --shadow:  rgba(241,158,194,0.22);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Cafe24SsurroundAir','Nunito',sans-serif;color:var(--dark);min-height:100vh;}

/* ── NAV ── */
.nav{
  background:linear-gradient(135deg,#fde0ee,#fdf4cc);
  border-bottom:2.5px dashed var(--border);
  padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;
  height:64px;position:sticky;top:0;z-index:100;
  box-shadow:0 3px 16px var(--shadow);
}
.logo{font-size:1.35rem;color:var(--dark);display:flex;align-items:center;gap:8px;cursor:pointer;}
.logo svg{animation:spin 8s linear infinite;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.nav-right{display:flex;align-items:center;gap:10px;}
.cart-btn{
  background:var(--main);color:var(--bg);
  border:none;border-radius:50px;padding:9px 18px;
  font-family:inherit;font-size:0.85rem;cursor:pointer;
  display:flex;align-items:center;gap:6px;
  box-shadow:0 3px 12px var(--shadow);
  transition:all .2s;
}
.cart-btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px var(--shadow);}
.cart-count{
  background:var(--bg);color:var(--main2);
  border-radius:50%;width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:0.72rem;font-weight:800;
}

/* ── 히어로 배너 ── */
.hero{
  background:linear-gradient(160deg,#fde0ee 0%,#fdf0c8 55%,#ffe8d0 100%);
  padding:40px 24px 36px;text-align:center;
  border-bottom:2px dashed var(--border);position:relative;overflow:hidden;
}
.hero-star{position:absolute;opacity:0.2;animation:sfloat 5s ease-in-out infinite;pointer-events:none;}
@keyframes sfloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(18deg)}}
.hero h1{font-size:1.75rem;margin-bottom:8px;color:var(--dark);}
.hero h1 em{color:var(--main);font-style:normal;}
.hero p{font-size:0.9rem;color:var(--mid);margin-bottom:20px;}
.hero-search{
  display:flex;gap:0;max-width:480px;margin:0 auto;
  background:var(--bg);border:2px solid var(--border);
  border-radius:50px;overflow:hidden;
  box-shadow:0 4px 16px var(--shadow);
}
.hero-search input{
  flex:1;border:none;background:transparent;
  padding:12px 20px;font-family:inherit;font-size:0.9rem;color:var(--dark);outline:none;
}
.hero-search input::placeholder{color:var(--mid);}
.hero-search button{
  background:var(--main);border:none;color:var(--bg);
  padding:12px 22px;cursor:pointer;font-family:inherit;font-size:0.88rem;
  transition:background .2s;
}
.hero-search button:hover{background:var(--main2);}

/* ── 레이아웃 ── */
.page{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px;gap:24px;}

/* ── 사이드바 ── */
.sidebar{width:220px;flex-shrink:0;}
.side-box{
  background:var(--card);border:2px solid var(--border);
  border-radius:20px;padding:18px;margin-bottom:16px;
}
.side-title{font-size:0.82rem;color:var(--mid);font-weight:700;letter-spacing:.05em;margin-bottom:12px;}
.filter-btn{
  display:block;width:100%;text-align:left;
  background:transparent;border:1.5px solid var(--border);
  border-radius:50px;padding:7px 14px;
  font-family:inherit;font-size:0.82rem;color:var(--dark);
  cursor:pointer;margin-bottom:7px;transition:all .18s;
}
.filter-btn:hover,.filter-btn.active{
  background:var(--main);color:var(--bg);
  border-color:var(--main);
  box-shadow:0 3px 10px var(--shadow);
}
.price-range{display:flex;flex-direction:column;gap:8px;}
.price-range input[type=range]{
  -webkit-appearance:none;width:100%;height:6px;
  border-radius:3px;background:var(--border);outline:none;
}
.price-range input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:var(--main);cursor:pointer;
}
.price-label{font-size:0.78rem;color:var(--mid);text-align:right;}

/* ── 메인 상품 영역 ── */
.main-area{flex:1;min-width:0;}
.toolbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;flex-wrap:wrap;gap:10px;
}
.result-count{font-size:0.85rem;color:var(--mid);}
.result-count strong{color:var(--dark);}
.sort-sel{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:50px;padding:7px 16px;
  font-family:inherit;font-size:0.82rem;color:var(--dark);cursor:pointer;outline:none;
}

/* 아이돌 탭 */
.idol-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.idol-tab{
  border-radius:999px;padding:7px 16px;border:2px solid var(--border);
  background:var(--card);color:var(--dark);font-family:inherit;
  font-size:0.82rem;cursor:pointer;transition:all .18s;white-space:nowrap;
}
.idol-tab:hover,.idol-tab.active{
  background:var(--main);color:var(--bg);border-color:var(--main);
  box-shadow:0 3px 10px var(--shadow);
}

/* ── 상품 그리드 ── */
.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:16px;
}
.product-card{
  background:var(--bg);border:2px solid var(--border);
  border-radius:20px;overflow:hidden;cursor:pointer;
  transition:transform .22s,box-shadow .22s;
  position:relative;
}
.product-card:hover{transform:translateY(-5px);box-shadow:0 14px 32px var(--shadow);}

.product-img{
  width:100%;aspect-ratio:1;
  display:flex;align-items:center;justify-content:center;
  font-size:3.2rem;position:relative;overflow:hidden;
}
.badge-new,.badge-hot,.badge-sale{
  position:absolute;top:10px;left:10px;
  border-radius:999px;padding:3px 10px;font-size:0.68rem;font-weight:700;
  font-family:'Nunito',sans-serif;
}
.badge-new{background:var(--apricot);color:#904020;}
.badge-hot{background:var(--main);color:var(--bg);}
.badge-sale{background:#ffe050;color:#806010;}

.wish-btn{
  position:absolute;top:8px;right:10px;
  background:var(--bg);border:none;border-radius:50%;
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1rem;box-shadow:0 2px 8px var(--shadow);
  transition:transform .15s;
}
.wish-btn:hover{transform:scale(1.2);}
.wish-btn.active{color:var(--main);}

.product-info{padding:12px 12px 14px;}
.product-idol{font-size:0.7rem;color:var(--mid);margin-bottom:3px;font-family:'Nunito',sans-serif;font-weight:700;}
.product-name{font-size:0.88rem;color:var(--dark);margin-bottom:6px;line-height:1.35;}
.product-price{font-size:1rem;color:var(--dark);font-weight:700;}
.product-price .og{
  font-size:0.75rem;color:var(--mid);text-decoration:line-through;margin-right:4px;font-weight:400;
}
.add-cart{
  width:100%;margin-top:8px;padding:8px;
  background:transparent;border:1.5px solid var(--border);
  border-radius:50px;font-family:inherit;font-size:0.78rem;color:var(--mid);
  cursor:pointer;transition:all .18s;
}
.add-cart:hover{background:var(--main);border-color:var(--main);color:var(--bg);}

/* 빈 결과 */
.empty{
  text-align:center;padding:60px 20px;color:var(--mid);
  display:none;
}
.empty.show{display:block;}
.empty-icon{font-size:3rem;margin-bottom:12px;}

/* ── 장바구니 드로어 ── */
.drawer-overlay{
  display:none;position:fixed;inset:0;background:rgba(122,74,94,0.18);z-index:200;
}
.drawer-overlay.open{display:block;}
.drawer{
  position:fixed;right:0;top:0;bottom:0;width:340px;
  background:var(--bg);border-left:2px solid var(--border);
  z-index:201;transform:translateX(100%);transition:transform .3s ease;
  display:flex;flex-direction:column;
}
.drawer.open{transform:translateX(0);}
.drawer-head{
  padding:20px;border-bottom:2px dashed var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,#fde8f2,#fff8d0);
}
.drawer-head h2{font-size:1.1rem;color:var(--dark);}
.close-btn{
  background:transparent;border:none;font-size:1.4rem;
  color:var(--mid);cursor:pointer;padding:4px;
}
.drawer-items{flex:1;overflow-y:auto;padding:16px;}
.cart-item{
  display:flex;gap:12px;align-items:center;
  padding:12px 0;border-bottom:1.5px dashed var(--border);
}
.cart-item:last-child{border:none;}
.cart-emoji{font-size:2.2rem;width:52px;height:52px;
  background:var(--light);border-radius:14px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cart-info{flex:1;min-width:0;}
.cart-idol{font-size:0.68rem;color:var(--mid);font-family:'Nunito',sans-serif;font-weight:700;}
.cart-name{font-size:0.83rem;color:var(--dark);margin-bottom:4px;}
.cart-row{display:flex;align-items:center;gap:8px;}
.qty-btn{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:50%;width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:0.9rem;color:var(--dark);font-family:inherit;
  transition:background .15s;
}
.qty-btn:hover{background:var(--main);color:var(--bg);border-color:var(--main);}
.qty-num{font-size:0.85rem;color:var(--dark);min-width:16px;text-align:center;}
.cart-price{font-size:0.85rem;font-weight:700;color:var(--dark);margin-left:auto;}
.remove-item{background:transparent;border:none;color:var(--mid);cursor:pointer;font-size:1rem;padding:2px;}
.drawer-foot{
  padding:18px;border-top:2px dashed var(--border);
  background:linear-gradient(135deg,#fff8d0,#fde8f2);
}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.total-label{font-size:0.88rem;color:var(--mid);}
.total-price{font-size:1.2rem;font-weight:700;color:var(--dark);}
.checkout-btn{
  width:100%;padding:13px;background:var(--main);color:var(--bg);
  border:none;border-radius:50px;font-family:inherit;font-size:0.95rem;
  cursor:pointer;box-shadow:0 4px 14px var(--shadow);transition:all .2s;
}
.checkout-btn:hover{background:var(--main2);transform:translateY(-2px);}
.cart-empty{text-align:center;padding:40px 20px;color:var(--mid);}
.cart-empty-icon{font-size:2.8rem;margin-bottom:10px;}

/* ── 모달 (상품 상세) ── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(122,74,94,0.22);z-index:300;
  align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--bg);border:2px solid var(--border);
  border-radius:28px;max-width:480px;width:100%;
  box-shadow:0 20px 60px var(--shadow);overflow:hidden;
  animation:pop .25s ease;
}
@keyframes pop{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.modal-img{
  width:100%;height:200px;display:flex;align-items:center;
  justify-content:center;font-size:5rem;
}
.modal-body{padding:22px;}
.modal-idol{font-size:0.75rem;color:var(--mid);font-family:'Nunito',sans-serif;font-weight:700;margin-bottom:4px;}
.modal-name{font-size:1.2rem;color:var(--dark);margin-bottom:8px;}
.modal-price{font-size:1.4rem;font-weight:700;color:var(--dark);margin-bottom:12px;}
.modal-desc{font-size:0.84rem;color:var(--mid);line-height:1.7;margin-bottom:16px;}
.modal-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.modal-tag{
  background:var(--light);color:var(--mid);
  border-radius:999px;padding:4px 12px;font-size:0.75rem;
  border:1.5px solid var(--border);
}
.modal-actions{display:flex;gap:10px;}
.modal-cart{
  flex:1;padding:12px;background:var(--main);color:var(--bg);
  border:none;border-radius:50px;font-family:inherit;font-size:0.9rem;
  cursor:pointer;box-shadow:0 4px 14px var(--shadow);transition:all .2s;
}
.modal-cart:hover{background:var(--main2);}
.modal-close{
  padding:12px 16px;background:var(--card);color:var(--dark);
  border:2px solid var(--border);border-radius:50px;
  font-family:inherit;font-size:0.9rem;cursor:pointer;transition:all .2s;
}
.modal-close:hover{border-color:var(--main);color:var(--main);}

/* ── 토스트 ── */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--dark);color:var(--bg);
  border-radius:50px;padding:12px 24px;font-size:0.87rem;
  box-shadow:0 6px 20px rgba(122,74,94,0.35);z-index:500;
  transition:transform .3s ease;pointer-events:none;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── 반응형 ── */
@media(max-width:700px){
  .sidebar{display:none;}
  .product-grid{grid-template-columns:repeat(2,1fr);}
  .drawer{width:100%;}
  .page{padding:16px 12px;}
}
</style>
</head>
<body>

<!-- ── 네비게이션 ── -->
<nav class="nav">
  <div class="logo" onclick="resetAll()">
    <svg width="26" height="26" viewBox="0 0 36 36">
      <path d="M18 3l3.2 9.6h10.1l-8.2 5.9 3.1 9.6L18 23.3l-8.2 5.8 3.1-9.6-8.2-5.9h10.1z" fill="#f19ec2"/>
    </svg>
    스타봉봉
  </div>
  <div class="nav-right">
    <button class="cart-btn" onclick="toggleDrawer()">
      🛍️ 장바구니
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</nav>

<!-- ── 히어로 ── -->
<div class="hero">
  <svg class="hero-star" style="top:12%;left:5%;width:32px;animation-delay:0s"    viewBox="0 0 36 36"><path d="M18 3l3.2 9.6h10.1l-8.2 5.9 3.1 9.6L18 23.3l-8.2 5.8 3.1-9.6-8.2-5.9h10.1z" fill="#f19ec2"/></svg>
  <svg class="hero-star" style="top:10%;right:6%;width:24px;animation-delay:1.2s" viewBox="0 0 36 36"><path d="M18 3l3.2 9.6h10.1l-8.2 5.9 3.1 9.6L18 23.3l-8.2 5.8 3.1-9.6-8.2-5.9h10.1z" fill="#ffe96a"/></svg>
  <svg class="hero-star" style="bottom:16%;left:8%;width:18px;animation-delay:2s" viewBox="0 0 36 36"><path d="M18 3l3.2 9.6h10.1l-8.2 5.9 3.1 9.6L18 23.3l-8.2 5.8 3.1-9.6-8.2-5.9h10.1z" fill="#ffc8a0"/></svg>
  <svg class="hero-star" style="bottom:20%;right:5%;width:20px;animation-delay:0.6s" viewBox="0 0 36 36"><path d="M18 3l3.2 9.6h10.1l-8.2 5.9 3.1 9.6L18 23.3l-8.2 5.8 3.1-9.6-8.2-5.9h10.1z" fill="#ffb8c8"/></svg>
  <h1>✨ <em>K-POP 공식 굿즈</em>를 한곳에서!</h1>
  <p>아이돌별 · 굿즈 종류별로 쉽게 찾아보세요 🌸</p>
  <div class="hero-search">
    <input type="text" id="searchInput" placeholder="🔍  아이돌, 굿즈 이름 검색..." oninput="applyFilters()">
    <button onclick="applyFilters()">검색</button>
  </div>
</div>

<!-- ── 메인 레이아웃 ── -->
<div class="page">

  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="side-box">
      <div class="side-title">🎀 굿즈 종류</div>
      <button class="filter-btn active" data-type="all" onclick="setType(this,'all')">전체</button>
      <button class="filter-btn" data-type="응원봉" onclick="setType(this,'응원봉')">⭐ 응원봉</button>
      <button class="filter-btn" data-type="포토카드" onclick="setType(this,'포토카드')">🖼️ 포토카드</button>
      <button class="filter-btn" data-type="키링" onclick="setType(this,'키링')">🔑 키링</button>
      <button class="filter-btn" data-type="인형" onclick="setType(this,'인형')">🧸 인형</button>
      <button class="filter-btn" data-type="시즌그리팅" onclick="setType(this,'시즌그리팅')">📅 시즌그리팅</button>
      <button class="filter-btn" data-type="의류" onclick="setType(this,'의류')">👕 의류</button>
      <button class="filter-btn" data-type="문구" onclick="setType(this,'문구')">✏️ 문구</button>
      <button class="filter-btn" data-type="생활용품" onclick="setType(this,'생활용품')">☕ 생활용품</button>
    </div>
    <div class="side-box">
      <div class="side-title">💰 가격대</div>
      <div class="price-range">
        <input type="range" id="priceRange" min="0" max="100000" step="5000" value="100000" oninput="updatePrice(this.value)">
        <div class="price-label" id="priceLabel">~ 100,000원</div>
      </div>
    </div>
    <div class="side-box">
      <div class="side-title">🌸 소속사</div>
      <button class="filter-btn active" data-agency="all" onclick="setAgency(this,'all')">전체</button>
      <button class="filter-btn" data-agency="HYBE" onclick="setAgency(this,'HYBE')">HYBE</button>
      <button class="filter-btn" data-agency="SM" onclick="setAgency(this,'SM')">SM</button>
      <button class="filter-btn" data-agency="JYP" onclick="setAgency(this,'JYP')">JYP</button>
      <button class="filter-btn" data-agency="YG" onclick="setAgency(this,'YG')">YG</button>
      <button class="filter-btn" data-agency="STARSHIP" onclick="setAgency(this,'STARSHIP')">STARSHIP</button>
    </div>
  </aside>

  <!-- 메인 -->
  <div class="main-area">

    <!-- 아이돌 탭 -->
    <div class="idol-tabs" id="idolTabs">
      <button class="idol-tab active" data-idol="all" onclick="setIdol(this,'all')">🌟 전체</button>
      <button class="idol-tab" data-idol="BTS" onclick="setIdol(this,'BTS')">💜 BTS</button>
      <button class="idol-tab" data-idol="세븐틴" onclick="setIdol(this,'세븐틴')">💎 세븐틴</button>
      <button class="idol-tab" data-idol="뉴진스" onclick="setIdol(this,'뉴진스')">🐰 뉴진스</button>
      <button class="idol-tab" data-idol="르세라핌" onclick="setIdol(this,'르세라핌')">🔥 르세라핌</button>
      <button class="idol-tab" data-idol="aespa" onclick="setIdol(this,'aespa')">🤖 aespa</button>
      <button class="idol-tab" data-idol="NCT" onclick="setIdol(this,'NCT')">🍊 NCT</button>
      <button class="idol-tab" data-idol="트와이스" onclick="setIdol(this,'트와이스')">🍭 트와이스</button>
      <button class="idol-tab" data-idol="스트레이키즈" onclick="setIdol(this,'스트레이키즈')">🐺 스트레이키즈</button>
      <button class="idol-tab" data-idol="BLACKPINK" onclick="setIdol(this,'BLACKPINK')">🖤 BLACKPINK</button>
      <button class="idol-tab" data-idol="아이브" onclick="setIdol(this,'아이브')">🌹 아이브</button>
    </div>

    <!-- 툴바 -->
    <div class="toolbar">
      <div class="result-count" id="resultCount">상품 <strong>0</strong>개</div>

let cart = [];
let currentIdol    = 'all';
let currentType    = 'all';
let currentAgency  = 'all';
let maxPrice       = 100000;
let currentModal   = null;

// ════════════════════════════════
// 렌더
// ════════════════════════════════
function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const sort = document.getElementById('sortSel').value;

  let result = products.filter(p => {
    const matchIdol   = currentIdol   === 'all' || p.idol   === currentIdol;
    const matchType   = currentType   === 'all' || p.type   === currentType;
    const matchAgency = currentAgency === 'all' || p.agency === currentAgency;
    const matchPrice  = p.price <= maxPrice;
    const matchSearch = !q || p.name.toLowerCase().includes(q)
                           || p.idol.toLowerCase().includes(q)
                           || p.type.toLowerCase().includes(q)
                           || p.tags.some(t => t.toLowerCase().includes(q));
    return matchIdol && matchType && matchAgency && matchPrice && matchSearch;
  });

  if (sort === 'low')  result.sort((a,b) => a.price - b.price);
  if (sort === 'high') result.sort((a,b) => b.price - a.price);
  if (sort === 'name') result.sort((a,b) => a.name.localeCompare(b.name,'ko'));

  renderProducts(result);
  document.getElementById('resultCount').innerHTML = `상품 <strong>${result.length}</strong>개`;
  document.getElementById('emptyMsg').classList.toggle('show', result.length === 0);
}

function renderProducts(list) {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = list.map(p => `
    <div class="product-card" onclick="openModal(${p.id})">
      <div class="product-img" style="background:${p.bg}">
        ${p.badge==='new'  ? '<span class="badge-new">NEW</span>'  : ''}
        ${p.badge==='hot'  ? '<span class="badge-hot">🔥 HOT</span>' : ''}
        ${p.badge==='sale' ? '<span class="badge-sale">SALE</span>' : ''}
        <button class="wish-btn ${isWished(p.id)?'active':''}"
          onclick="event.stopPropagation();toggleWish(${p.id},this)"
          title="찜하기">♥</button>
        ${p.emoji}
      </div>
      <div class="product-info">
        <div class="product-idol">${p.idol} · ${p.type}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">${p.price.toLocaleString()}원</div>
        <button class="add-cart" onclick="event.stopPropagation();addToCart(${p.id})">+ 장바구니</button>
      </div>
    </div>
  `).join('');
}

// ════════════════════════════════
// 찜
// ════════════════════════════════
let wished = new Set();
function isWished(id) { return wished.has(id); }
function toggleWish(id, btn) {
  if (wished.has(id)) { wished.delete(id); btn.classList.remove('active'); showToast('찜 목록에서 제거했어요 💔'); }
  else                { wished.add(id);    btn.classList.add('active');    showToast('찜 목록에 추가했어요 💕'); }
}

// ════════════════════════════════
// 필터 세터
// ════════════════════════════════
function setIdol(el, val) {
  currentIdol = val;
  document.querySelectorAll('.idol-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}
function setType(el, val) {
  currentType = val;
  document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}
function setAgency(el, val) {
  currentAgency = val;
  document.querySelectorAll('[data-agency]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}
function updatePrice(val) {
  maxPrice = parseInt(val);
  document.getElementById('priceLabel').textContent = `~ ${Number(val).toLocaleString()}원`;
  applyFilters();
}
function resetAll() {
  currentIdol = 'all'; currentType = 'all'; currentAgency = 'all'; maxPrice = 100000;
  document.getElementById('searchInput').value = '';
  document.getElementById('priceRange').value = 100000;
  document.getElementById('priceLabel').textContent = '~ 100,000원';
  document.querySelectorAll('.idol-tab').forEach(b => b.classList.remove('active'));
  document.querySelector('.idol-tab[data-idol="all"]').classList.add('active');
  document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-type="all"]').classList.add('active');
  document.querySelectorAll('[data-agency]').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-agency="all"]').classList.add('active');
  applyFilters();
}

// ════════════════════════════════
// 장바구니
// ════════════════════════════════
function addToCart(id) {
  const p = products.find(x => x.id === id);
  const existing = cart.find(x => x.id === id);
  if (existing) existing.qty++;
  else cart.push({...p, qty:1});
  updateCartUI();
  showToast(`🛍️ "${p.name.slice(0,14)}..." 담았어요!`);
}
function removeFromCart(id) {
  cart = cart.filter(x => x.id !== id);
  updateCartUI();
}
function changeQty(id, delta) {
  const item = cart.find(x => x.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) removeFromCart(id);
  else updateCartUI();
}
function updateCartUI() {
  const total = cart.reduce((s,i) => s + i.qty, 0);
  const sum   = cart.reduce((s,i) => s + i.price * i.qty, 0);
  document.getElementById('cartCount').textContent = total;
  document.getElementById('totalPrice').textContent = sum.toLocaleString() + '원';

  const items = document.getElementById('drawerItems');
  if (!cart.length) {
    items.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛍️</div>장바구니가 비어있어요!<br><small style="color:var(--mid)">마음에 드는 굿즈를 담아보세요 🌸</small></div>`;
    return;
  }
  items.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="cart-emoji">${item.emoji}</div>
      <div class="cart-info">
        <div class="cart-idol">${item.idol} · ${item.type}</div>
        <div class="cart-name">${item.name}</div>
        <div class="cart-row">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},+1)">+</button>
          <span class="cart-price">${(item.price*item.qty).toLocaleString()}원</span>
        </div>
      </div>
      <button class="remove-item" onclick="removeFromCart(${item.id})">✕</button>
    </div>
  `).join('');
}
function toggleDrawer() {
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function checkout() {
  if (!cart.length) { showToast('장바구니가 비어있어요! 🛍️'); return; }
  cart = [];
  updateCartUI();
  toggleDrawer();
  showToast('✨ 구매가 완료되었어요! 감사합니다 🌸');
}

// ════════════════════════════════
// 모달
// ════════════════════════════════
function openModal(id) {
  const p = products.find(x => x.id === id);
  currentModal = p;
  document.getElementById('modalImg').style.background = p.bg;
  document.getElementById('modalImg').innerHTML = `<span style="font-size:5rem">${p.emoji}</span>`;
  document.getElementById('modalIdol').textContent = `${p.idol} · ${p.agency} · ${p.type}`;
  document.getElementById('modalName').textContent = p.name;
  document.getElementById('modalPrice').textContent = p.price.toLocaleString() + '원';
  document.getElementById('modalDesc').textContent = p.desc;
  document.getElementById('modalTags').innerHTML = p.tags.map(t=>`<span class="modal-tag"># ${t}</span>`).join('');
  document.getElementById('modalCartBtn').onclick = () => { addToCart(id); closeModal(); };
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
}

// ════════════════════════════════
// 토스트
// ════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ════════════════════════════════
// 초기화
// ════════════════════════════════
applyFilters();
updateCartUI();
</script>
</body>
</html>
